name: Build & Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "server/**"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "🚀 Starting backend deployment"

            cd /home/deployer/apps/ecommerce-module

            echo "📥 Sync latest code"
            git fetch origin
            git reset --hard origin/main

            echo "🧹 Cleaning Docker cache"
            docker builder prune -f

            echo "🛑 Stopping old container"
            docker compose stop backend

            echo "🐳 Rebuilding backend image (NO CACHE)"
            docker compose build backend --no-cache

            echo "🚀 Starting NEW container (force recreate)"
            docker compose up -d backend --force-recreate

            echo "🧪 Verifying new container"
            docker ps | grep ecommerce-backend

            echo "📜 Showing latest logs"
            docker logs ecommerce-module-backend-1 --tail 30

            echo "🔄 Reloading Nginx"
            docker restart nginx-proxy

            echo "✅ Backend deployment completed"