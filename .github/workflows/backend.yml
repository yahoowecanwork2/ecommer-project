name: Build & Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "server/**"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "🚀 Starting backend deployment"

            cd /home/deployer/apps/ecommerce-module

            echo "📥 Pulling latest code"
            git reset --hard
            git pull origin main

            echo "🐳 Rebuilding backend image (NO CACHE)"
            docker compose build backend --no-cache

            echo "🔄 Restarting backend container"
            docker compose up -d backend

            echo "🧪 Verifying backend container is running"
            docker ps | grep ecommerce-backend || echo "⚠️ Backend not running"

            echo "🔄 Reloading Nginx"
            docker restart nginx-proxy

            echo "✅ Backend deployment completed successfully"
