name: Build & Deploy Admin Panel

on:
  push:
    branches:
      - main
    paths:
      - "admin/**"

jobs:
  deploy-admin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Admin Panel on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 8484
          script: |
            echo "🚀 Starting admin panel deployment"

            cd /home/deployer/apps/ecommerce-module

            echo "📥 Pulling latest code"
            git reset --hard
            git pull origin main

            echo "🧹 Cleaning old Docker cache (prevents stale Vite build)"
            docker builder prune -f

            echo "🐳 Rebuilding admin image (NO CACHE)"
            docker compose build adminpanel --no-cache

            echo "🔄 Restarting admin container"
            docker compose up -d adminpanel

            echo "🧪 Verifying environment inside container"
            docker compose exec adminpanel printenv | grep VITE || echo "⚠️ ENV not found"

            echo "🔄 Reloading Nginx"
            docker restart nginx-proxy

            echo "✅ Admin panel deployment completed successfully"
